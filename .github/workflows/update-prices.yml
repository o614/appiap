name: Update App Prices to KV

on:
  schedule:
    # 每周日凌晨 00:00 (UTC) 自动执行
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # 允许手动点击运行

# 全局环境变量：强制 Action 插件使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          # 将 Node 版本从 20 升级到 24
          node-version: '24'

      - name: 运行爬虫脚本
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_NAMESPACE_ID: ${{ secrets.CF_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node scraper.js
