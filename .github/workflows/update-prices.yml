name: Update App Prices to KV

on:
  schedule:
    # 设定为每周日凌晨 00:00 (UTC时间) 自动执行一次
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # 允许你在 GitHub 网页上手动点击运行按钮进行测试

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 运行爬虫脚本
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_NAMESPACE_ID: ${{ secrets.CF_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node scraper.js
